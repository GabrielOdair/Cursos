<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        body 
        { background-color: rgb(73, 88, 224);
            color: rgb(232, 243, 253);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            
        }
        h1 { color: rgb(221, 221, 33);}
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <p>Já me livrei</p>
    <script>

 var n1 = Number(window.prompt('Digite um número'))//string
 var n2 = Number(window.prompt('Digite outro número'))//string
 var s = n1 + n2 
 window.alert('A soma dos valores é '+ s)//contatenação
 //number + number para adição
 //string + string para contatenação




    </script>
</body>
